name: 构建知识库网页
on:
  push:
    branches: [main]
    paths:
      - 'Pilot/单词本.md'
      - 'Pilot/知识本.md'
      - 'Pilot/指南本.md'
      - 'Pilot/generate.py'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: 生成 HTML
        run: python Pilot/generate.py
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Pilot/index.html
          git diff --staged --quiet || git commit -m "auto: 更新知识库网页"
          git push

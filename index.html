<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilot Knowledge</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F3EE;--bg-card:#FAF9F5;--sidebar-bg:#EDEAE2;--accent:#B5846E;--accent-hover:#A27460;--accent-light:rgba(181,132,110,0.10);--accent-light2:rgba(181,132,110,0.06);--text:#2D2B28;--text-light:#6B6864;--text-muted:#9B9793;--border:rgba(177,173,161,0.28);--shadow:rgba(45,43,40,0.07);--header-h:52px;--tab-h:46px;--sidebar-w:260px}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E"),linear-gradient(180deg,#F4F3EE 0%,#F2F0EA 100%);background-size:256px 256px,100% 100%}
.menu-btn{display:none;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;border:none;background:transparent;border-radius:4px;transition:background .15s}
.menu-btn:hover{background:var(--accent-light2)}
.menu-btn .hamburger{width:20px;height:14px;position:relative}
.menu-btn .hamburger span{position:absolute;left:0;right:0;height:2px;background:var(--text);border-radius:1px;transition:all .2s}
.menu-btn .hamburger span:nth-child(1){top:0}
.menu-btn .hamburger span:nth-child(2){top:6px}
.menu-btn .hamburger span:nth-child(3){top:12px}
.menu-btn.active .hamburger span:nth-child(1){top:6px;transform:rotate(45deg)}
.menu-btn.active .hamburger span:nth-child(2){opacity:0}
.menu-btn.active .hamburger span:nth-child(3){top:6px;transform:rotate(-45deg)}
.header{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--header-h);background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;backdrop-filter:blur(8px)}
.header .logo{display:flex;align-items:center;gap:6px;font-size:1.6rem;letter-spacing:1px}
.header .logo .icon{font-size:1.7rem;font-style:italic;color:var(--accent)}
.header .logo .brand{font-weight:700;color:var(--accent);font-style:italic;font-size:1.7rem;letter-spacing:2px}
.header .logo .suffix{font-weight:300;color:var(--text);font-style:italic;font-size:1.55rem;letter-spacing:3px}
.tab-bar{position:fixed;top:var(--header-h);left:0;right:0;z-index:190;height:var(--tab-h);background:var(--sidebar-bg);border-bottom:1px solid var(--border);box-shadow:0 2px 6px rgba(45,43,40,0.06);display:flex;align-items:stretch;justify-content:center;padding:0;overflow-x:auto}
.tab-btn{flex:0 0 auto;padding:0 28px;display:flex;align-items:center;gap:6px;font-size:0.88rem;font-weight:500;color:var(--text-light);cursor:pointer;user-select:none;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text);background:var(--accent-light2)}
.tab-btn.active{color:var(--accent);font-weight:600;border-bottom-color:var(--accent);background:#D8D3C8}
.wrapper{display:flex;padding-top:calc(var(--header-h) + var(--tab-h));min-height:100vh}
.sidebar{position:fixed;top:calc(var(--header-h) + var(--tab-h));left:0;bottom:0;width:var(--sidebar-w);background:var(--sidebar-bg);border-right:1px solid var(--border);overflow-y:auto;z-index:80;padding:24px 0 24px;transition:transform .25s ease-out}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar .sec-title{padding:0 14px 4px;font-size:0.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px}
.sidebar a{display:block;padding:6px 14px 6px 18px;font-size:0.85rem;color:var(--text-light);text-decoration:none;border-left:3px solid transparent;transition:all .12s}
.sidebar a:hover{background:var(--accent-light);color:var(--text)}
.sidebar a.active{color:var(--accent);font-weight:500;border-left-color:var(--accent);background:#D8D3C8}
.sidebar a.sub{padding-left:30px;font-size:.82rem}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:75;opacity:0;transition:opacity .2s}
.overlay.active{opacity:1}
.main{margin-left:var(--sidebar-w);flex:1;min-width:0;padding:24px 36px 24px;transition:margin-left .25s ease-out}
.content-card{background:var(--bg-card);border:1px solid var(--border);border-radius:5px;padding:24px 32px 28px;box-shadow:0 1px 3px var(--shadow);margin-bottom:24px}
.content-card:target{border-left:3px solid var(--accent);box-shadow:0 2px 8px rgba(181,132,110,0.12)}
.content-card h1{font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--accent)}
.content-card h2{font-size:1.15rem;font-weight:600;color:var(--text);margin-top:0;margin-bottom:8px}
.content-card h3{font-size:1.02rem;font-weight:600;color:var(--text-light);margin-top:18px;margin-bottom:6px}
.content-card h4{font-size:.92rem;font-weight:600;color:var(--text-muted);margin-top:14px;margin-bottom:5px}
.content-card p{margin:6px 0}
.content-card blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:10px 0;background:var(--accent-light);color:var(--text-light);font-size:.88rem;border-radius:0 3px 3px 0}
.content-card ul,.content-card ol{margin:6px 0;padding-left:22px}
.content-card li{margin:3px 0}
.content-card hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.content-card strong{color:var(--text);font-weight:600}
.content-card code{background:var(--accent-light);padding:1px 5px;border-radius:3px;font-size:.85em;color:var(--text)}
.content-card .empty-state{color:var(--text-muted);font-style:italic;padding:16px 0}
.content-card .tbl-wrap{overflow-x:auto;margin:10px 0}
.content-card table{width:100%;border-collapse:collapse;font-size:.88rem}
.content-card th,.content-card td{padding:8px 12px;text-align:left;vertical-align:top;border-bottom:1px solid var(--border)}
.content-card th{background:var(--sidebar-bg);font-weight:600;color:var(--text);font-size:.82rem;border-bottom:2px solid var(--accent);white-space:nowrap}
.content-card tr:last-child td{border-bottom:none}
.content-card tr:hover td{background:var(--accent-light2)}
.content-card .words-tbl td:first-child{font-weight:600;color:var(--accent);white-space:nowrap;width:1%}
.content-card .words-tbl td:nth-child(2){color:var(--text);white-space:nowrap;width:1%;padding-right:20px}
.content-card .words-tbl td:nth-child(3){color:var(--text-light);font-size:.86rem}
.content-card .info-tbl td:first-child{font-weight:600;white-space:nowrap;width:1%}
.content-card .guide-tbl th:first-child{width:18%}
.content-card .guide-tbl th:nth-child(2){width:15%}
.nav-buttons{display:flex;justify-content:space-between;margin:20px 0 10px}
.nav-btn{padding:8px 18px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text-light);cursor:pointer;font-size:.85rem;text-decoration:none;transition:all .12s}
.nav-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.nav-btn.disabled{opacity:.3;cursor:default;pointer-events:none}
@media(max-width:768px){
  .menu-btn{display:flex}
  .sidebar{transform:translateX(-100%);z-index:180}
  .sidebar.open{transform:translateX(0)}
  .overlay{display:block}
  .main{margin-left:0;padding:12px}
  .content-card{padding:14px 12px}
  .content-card h1{font-size:1.25rem}
  .content-card h2{font-size:1.05rem}
  .content-card h3{font-size:0.95rem}
  .content-card h4{font-size:0.88rem}
  .content-card p,.content-card li,.content-card td,.content-card th{font-size:0.86rem;line-height:1.6}
  .content-card table{font-size:0.82rem}
  .content-card th,.content-card td{padding:6px 8px;white-space:normal;word-break:break-word}
  .content-card .words-tbl td:first-child{white-space:normal;word-break:break-all;width:auto}
  .content-card .words-tbl td:nth-child(2){white-space:normal;word-break:break-word;width:auto;padding-right:8px}
  .content-card .info-tbl td:first-child{white-space:normal;word-break:break-word;width:auto}
  .tab-btn{flex:1;justify-content:center;padding:0 6px;font-size:0.75rem;white-space:normal;word-break:keep-all}
  .header{padding:0 10px}
  .header .logo{font-size:1.1rem}
  .header .logo .brand{font-size:1.2rem}
  .header .logo .suffix{font-size:1.05rem;display:none}
  .header .logo .icon{font-size:1.4rem}
  .nav-btn{padding:6px 12px;font-size:0.78rem}
  .nav-buttons{gap:8px}
}

@media(max-width:480px){
  .main{padding:10px}
  .content-card{padding:12px 10px}
  .content-card h1{font-size:1.15rem}
  .content-card h2{font-size:0.98rem}
  .content-card h3{font-size:0.9rem}
  .content-card table{font-size:0.78rem}
  .content-card th,.content-card td{padding:5px 6px}
  .content-card .words-tbl td:nth-child(3){font-size:0.76rem}
  .tab-btn{padding:0 4px;font-size:0.7rem;line-height:1.3}
  .header .logo .brand{font-size:1.1rem}
  .nav-btn{padding:5px 10px;font-size:0.75rem}
  /* 超小屏幕表格优化 */
  .content-card .words-tbl{display:block}
  .content-card .words-tbl thead{display:none}
  .content-card .words-tbl tbody{display:block}
  .content-card .words-tbl tr{display:block;margin-bottom:12px;border:1px solid var(--border);border-radius:4px;padding:8px}
  .content-card .words-tbl td{display:block;padding:4px 0;border:none;text-align:left;width:100%}
  .content-card .words-tbl td:first-child{font-size:0.85rem;margin-bottom:2px}
  .content-card .words-tbl td:nth-child(2){font-size:0.82rem;color:var(--text-light);margin-bottom:4px;padding-right:0}
  .content-card .words-tbl td:nth-child(3){font-size:0.8rem}
  /* 为单词表添加标签提示 */
  .content-card .words-tbl td::before{font-weight:600;color:var(--text-muted);font-size:0.72rem;margin-right:4px}
  .content-card .words-tbl td:first-child::before{content:'术语: '}
  .content-card .words-tbl td:nth-child(2)::before{content:'翻译: '}
  .content-card .words-tbl td:nth-child(3)::before{content:'说明: '}
}
.scroll-anchor{scroll-margin-top:calc(var(--header-h) + var(--tab-h) + 16px)}
</style>
</head>
<body>

<header class="header">
  <button class="menu-btn" id="menuBtn" aria-label="打开菜单">
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>
  <div class="logo"><span class="icon">&#9992;</span><span class="brand">Pilot</span><span class="suffix">Knowledge</span></div>
</header>

<div class="tab-bar" id="tabBar">
  <div class="tab-btn active" data-nb="words" onclick="switchNotebook('words')">单词本</div>
  <div class="tab-btn" data-nb="knowledge" onclick="switchNotebook('knowledge')">知识本</div>
  <div class="tab-btn" data-nb="guide" onclick="switchNotebook('guide')">指南书</div>
  <div class="tab-btn" data-nb="abbreviations" onclick="switchNotebook('abbreviations')">缩略词</div>
</div>

<div class="overlay" id="overlay"></div>

<div class="wrapper">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="mainContent"></main>
</div>

<script>
const DATA = {"words": {"title": "单词本", "sections": [{"id": "w-一-陆空通话-r-t-phraseology", "label": "📡 一、陆空通话（R/T Phraseology）", "items": [["READ BACK", "复诵", ""], ["HEAR BACK", "监听确认", ""], ["Roger", "抄收 / 收到", ""], ["Wilco", "抄收照办（Will comply）", ""], ["good day", "再见", ""], ["cleared for takeoff", "可以起飞", ""], ["cleared to land", "可以落地", ""], ["after departure", "离地后 / 离场后", ""], ["contact", "联系", ""], ["line up and wait", "进跑道等待", ""], ["negative", "不对 / 否定", ""], ["I say again", "我重复一遍", ""], ["expect", "预计 / 预期（前瞻性信息）", ""], ["acknowledge", "抄收", ""], ["over", "请回答", ""], ["out", "通话结束", ""], ["runway 01L, cleared for takeoff", "可以起飞，跑道01左", ""], ["after departure contact Approach 118.35", "离地后联系进近118.35", ""]], "empty": false}, {"id": "w-二-航空气象-aviation-weather", "label": "🌤️ 二、航空气象（Aviation Weather）", "items": [], "empty": true}, {"id": "w-三-航空器系统-aircraft-systems", "label": "🛩️ 三、航空器系统（Aircraft Systems）", "items": [], "empty": true}, {"id": "w-四-应急与救援-emergency-rescue", "label": "🆘 四、应急与救援（Emergency & Rescue）", "items": [], "empty": true}, {"id": "w-五-航空医疗-aviation-medical", "label": "🏥 五、航空医疗（Aviation Medical）", "items": [], "empty": true}, {"id": "w-六-航空机械-aviation-mechanics", "label": "🔧 六、航空机械（Aviation Mechanics）", "items": [], "empty": true}, {"id": "w-七-机场与空域-airports-airspace", "label": "🛫 七、机场与空域（Airports & Airspace）", "items": [], "empty": true}, {"id": "w-八-飞行程序-flight-procedures", "label": "📋 八、飞行程序（Flight Procedures）", "items": [], "empty": true}]}, "knowledge": {"title": "知识本", "sections": [{"id": "k-一-飞行原理", "label": "一、飞行原理", "subs": []}, {"id": "k-二-飞机系统", "label": "二、飞机系统", "subs": [{"id": "k-二-飞机系统-2-1-ads-b-广播式自动相关监视", "label": "2.1 ADS-B 广播式自动相关监视", "html": "<p>ADS-B（Automatic Dependent Surveillance Broadcast）是一种基于卫星导航和空地数据链的监视技术。飞机自动广播位置、高度、速度、识别码等信息，地面站和周围飞机均可接收。</p>\n<p>**ADS-B Out（发射）与 ADS-B In（接收）：**</p>\n<li>Out：飞机每秒广播一次位置信息（GPS经纬度、气压高度+GNSS几何高度、地速、航向、ICAO 24位地址码）</li>\n<li>In：驾驶舱显示周围 ADS-B 目标（CDTI），与 TCAS 互补</li>\n<p>**两种数据链：**</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>类型</th><th>频率</th><th>适用地区</th></tr>\n<tr><td>1090ES</td><td>1090 MHz</td><td>全球标准（ICAO指定），与Mode S应答机兼容</td></tr>\n<tr><td>UAT</td><td>978 MHz</td><td>美国通用航空，支持FIS-B气象服务</td></tr>\n</table></div>\n<p>**与 SSR 对比：**</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>特性</th><th>SSR</th><th>ADS-B</th></tr>\n<tr><td>询问方式</td><td>地面主动询问</td><td>飞机自主广播</td></tr>\n<tr><td>定位精度</td><td>0.1-1 NM</td><td>10-30 m</td></tr>\n<tr><td>更新率</td><td>4-12 秒</td><td>约 1 秒</td></tr>\n<tr><td>覆盖</td><td>雷达视距</td><td>可覆盖雷达盲区</td></tr>\n</table></div>\n<p>**运行要点：** ADS-B 自动运行，无需飞行员额外操作。应答机关闭时 ADS-B 也关闭。GNSS失效时位置数据降级。</p>\n<hr>"}, {"id": "k-二-飞机系统-2-2-cpdlc-数据链通信", "label": "2.2 CPDLC 数据链通信", "html": "<p>CPDLC（Controller Pilot Data Link Communications）是通过数据链在管制员和飞行员之间传输结构化文本消息的通信方式，用于执行管制指令。</p>\n<p>**底层数据链：**</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>数据链</th><th>覆盖范围</th><th>使用场景</th></tr>\n<tr><td>VDL Mode 2</td><td>约 200 NM</td><td>大陆航路和终端区</td></tr>\n<tr><td>HFDL</td><td>数千公里</td><td>海洋、极地区域</td></tr>\n<tr><td>SATCOM</td><td>全球</td><td>海洋区域主用</td></tr>\n</table></div>\n<p>**两套标准：** FANS-1/A（波音，成熟全球部署）与 ATN B1（空客/欧洲，ICAO官方标准）。新飞机（B787/A350）同时支持两套。</p>\n<p>**消息类型：**</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>方向</th><th>示例</th></tr>\n<tr><td>管制→机组（Uplink）</td><td>CLIMB TO FL310, PROCEED DIRECT PANKI</td></tr>\n<tr><td>机组→管制（Downlink）</td><td>WILCO, UNABLE, REQUEST CLIMB TO FL350</td></tr>\n<tr><td>系统消息</td><td>Connection Establishment, End Service</td></tr>\n</table></div>\n<p>**DCL（数字放行）：** CPDLC在机场最成熟的应用，推出前通过数据链接收放行许可（航路、起始高度、SID、应答机编码），替代语音放行。</p>\n<p>**运行要点：** CPDLC不用于紧急情况（仍用MAYDAY语音）、不用于起飞/着陆指令、不用于非标准/非常规指令。洋区运行时CPDLC+ADS-C是标准配置。</p>\n<hr>"}, {"id": "k-二-飞机系统-2-3-pbn-导航体系", "label": "2.3 PBN 导航体系", "html": "<p>PBN（Performance Based Navigation）将关注点从\"用什么导航源\"转移到\"飞这条航路需要多高的导航精度\"。分为 RNAV 和 RNP 两类。</p>\n<p>**RNAV（区域导航）：** 飞机沿航路点间路径飞行，不依赖飞越地面导航台。无需机载性能监视和告警能力（OPMA）。</p>\n<p>**RNP（所需导航性能）：** 在RNAV基础上增加机载性能监视与告警，系统实时计算定位精度，精度不足时自动告警。</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>规范</th><th>精度（95%）</th><th>场景</th></tr>\n<tr><td>RNAV 10 / RNP 4</td><td>±10 NM / ±4 NM</td><td>洋区</td></tr>\n<tr><td>RNAV 5</td><td>±5 NM</td><td>大陆航路</td></tr>\n<tr><td>RNAV 1 / RNP 1</td><td>±1 NM</td><td>SID / STAR</td></tr>\n<tr><td>RNP APCH</td><td>±0.3 NM（最终航段）</td><td>进近</td></tr>\n<tr><td>RNP AR APCH</td><td>低至 ±0.1 NM</td><td>特殊授权进近</td></tr>\n</table></div>\n<p>**RNP APCH 四种最低标准：**</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>类型</th><th>垂直引导</th><th>最低标准</th></tr>\n<tr><td>LNAV</td><td>无</td><td>最高（400-600ft）</td></tr>\n<tr><td>LNAV/VNAV</td><td>Baro-VNAV</td><td>中等（250-350ft）</td></tr>\n<tr><td>LP</td><td>无（水平精度更高）</td><td>中等</td></tr>\n<tr><td>LPV</td><td>SBAS（类精密）</td><td>最低（低至200ft DA）</td></tr>\n</table></div>\n<p>**常见误区：** RNAV 不等于 GPS。导航源可以是 GNSS、IRS、DME/DME、VOR/DME。</p>\n<hr>"}, {"id": "k-二-飞机系统-2-4-rvsm-缩小垂直间隔", "label": "2.4 RVSM 缩小垂直间隔", "html": "<p>RVSM（Reduced Vertical Separation Minima）将 FL290-FL410 的垂直间隔从 2000ft 压缩到 1000ft，可用高度层从 7 个增加到 14 个。</p>\n<p>**核心要求：** 两部独立高度测量系统、高度警戒系统、自动高度控制系统。总高度误差（TVE）不超过 ±200ft，统计偏差（ASE/AAD）各不超过 ±80ft（ICAO Doc 9574）。</p>\n<p>**与非 RVSM 飞机间隔：** 非 RVSM 飞机穿越时需保持 2000ft 垂直间隔。</p>\n<hr>"}, {"id": "k-二-飞机系统-2-5-tcas-空中防撞系统", "label": "2.5 TCAS 空中防撞系统", "html": "<p>TCAS（Traffic Collision Avoidance System）是机载最后一道安全防线，通过应答机问答独立判断冲突。</p>\n<p>**TCAS II Version 7.1（商业航空标准）：**</p>\n<li>TA（交通咨询）：τ ≈ 20-48 秒，黄色实心圆，提示观察</li>\n<li>RA（决断咨询）：τ ≈ 15-35 秒，红色实心方块+语音指令，必须立即执行</li>\n<p>**RA 类型：**</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>类型</th><th>语音</th><th>要求</th></tr>\n<tr><td>预防性</td><td>MONITOR VERTICAL SPEED</td><td>不改变当前垂直速度</td></tr>\n<tr><td>修正性</td><td>CLIMB / DESCEND</td><td>按指令改变垂直速度</td></tr>\n<tr><td>变更性</td><td>CLIMB NOW / DESCEND NOW</td><td>7.1 引入，可反转方向</td></tr>\n</table></div>\n<p>**RA 处置原则：**</p>\n<li>立即响应，不分析不犹豫，RA 优先级高于管制指令</li>\n<li>柔和但果断的俯仰变化（约 0.25G），垂直速度率 1500-2000 ft/min</li>\n<li>不使用航向改变回避</li>\n<li>机动后报告管制员\"TCAS RA\"</li>\n<li>冲突解除后语音\"CLEAR OF CONFLICT\"再返回原高度</li>\n<p>**低高度抑制：** 无线电高度 1100ft 以下 RA 自动抑制为 TA only；1100-2350ft 下降指令被削弱。</p>\n<hr>"}, {"id": "k-二-飞机系统-2-6-gpws-egpws-近地警告系统", "label": "2.6 GPWS / EGPWS 近地警告系统", "html": "<p>GPWS（Ground Proximity Warning System）用于防范 CFIT（可控飞行撞地）。核心传感器是无线电高度表。</p>\n<p>**GPWS 七个模式：**</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>模式</th><th>名称</th><th>触发条件</th><th>语音</th></tr>\n<tr><td>1</td><td>过大下降率</td><td>近地下降率超标</td><td>SINK RATE → PULL UP</td></tr>\n<tr><td>2</td><td>过大地形接近率</td><td>地形迅速接近</td><td>TERRAIN → PULL UP</td></tr>\n<tr><td>3</td><td>起飞/复飞后掉高</td><td>起飞或复飞后丢失高度</td><td>DON'T SINK</td></tr>\n<tr><td>4</td><td>不安全构型</td><td>高/低高度构型保护</td><td>TOO LOW FLAPS / GEAR</td></tr>\n<tr><td>5</td><td>低于下滑道</td><td>ILS进近显著低于下滑道</td><td>GLIDESLOPE</td></tr>\n<tr><td>6</td><td>决断高度</td><td>经过DA/DH</td><td>MINIMUMS</td></tr>\n<tr><td>7</td><td>风切变警告</td><td>探测到风切变</td><td>WINDSHEAR</td></tr>\n</table></div>\n<p>**EGPWS 增强功能：**</p>\n<li>全球地形数据库：比对飞机位置与数字地形图，\"看得见前方的山\"</li>\n<li>FLTA（前视地形回避）：预测未来轨迹，提前 30-60 秒告警</li>\n<li>PDA（过早下降警告）：进近中高度不足以飞到跑道时触发</li>\n<li>SmartRunway：自动识别跑道位置，提示跑道过长/障碍物</li>\n<li>SmartLanding：检查跑道长度是否足够</li>\n<p>**PULL UP 记忆项目：**</p>\n<li>断开自动驾驶和自动油门</li>\n<li>最大推力（TOGA）</li>\n<li>按正常姿态抬头（15-20°），不抖杆不失速</li>\n<li>验证推力、确认正上升率</li>\n<li>按 FCOM 收襟翼</li>\n<li>结合地形显示避让</li>\n<p>**与 TCAS 冲突时：** GPWS PULL UP 凌驾于 TCAS RA 之上。</p>\n<hr>"}]}, {"id": "k-三-航空气象", "label": "三、航空气象", "subs": [{"id": "k-三-航空气象-3-1-metar-读取顺序-按决策优先级", "label": "3.1 METAR 读取顺序（按决策优先级）", "html": "<li>**风、能见度/RVR、天气现象** — 决定能否起降、跑道、进近方式</li>\n<li>**云（云底高、云量）** — 决定进近方式选择</li>\n<li>**温度/露点、QNH** — 温露差 ≤ 3°C 且温度 ≤ 0°C 关注结冰</li>\n<li>**最近一小时变化（RE组/WS组）** — 趋势判断</li>\n<p>**实操提示：** 同时读当前报和上一份例行报，对比趋势。</p>\n<hr>"}, {"id": "k-三-航空气象-3-2-侧风与阵风评估", "label": "3.2 侧风与阵风评估", "html": "<p>**侧风心算：** 夹角 30°→风速×50%；45°→×70%；60°→×90%。</p>\n<p>**低空风切变信号：** 机场上游 20nm 内雷暴回波+地面风方向变化≥30°；强逆温层；跑道两端风速差>10kt。</p>\n<p>**阵风注意：** 阵风>15kt 且与跑道夹角>30°，侧风限制需降级使用（湿跑道×0.8）。</p>\n<hr>"}, {"id": "k-三-航空气象-3-3-能见度与-rvr", "label": "3.3 能见度与 RVR", "html": "<p>**核心原则：** 进近最低标准绑定的是 RVR，不是气象能见度。</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>进近类型</th><th>RVR 最低标准</th></tr>\n<tr><td>CAT I</td><td>550m</td></tr>\n<tr><td>CAT II</td><td>300-350m</td></tr>\n<tr><td>CAT IIIA</td><td>200m</td></tr>\n<tr><td>CAT IIIB</td><td>50-200m</td></tr>\n<tr><td>非精密/类精密</td><td>800-1200m</td></tr>\n</table></div>\n<p>**着陆标准：** 以跑道入口点和中间点RVR中较低值为准。</p>\n<hr>"}, {"id": "k-三-航空气象-3-4-taf-解读策略", "label": "3.4 TAF 解读策略", "html": "<p>**时间限定词：**</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>词</th><th>含义</th></tr>\n<tr><td>FM</td><td>从某时起确定性转变</td></tr>\n<tr><td>TEMPO</td><td>短暂出现（每次<1小时），有不确定性</td></tr>\n<tr><td>BECMG</td><td>逐步渐变</td></tr>\n</table></div>\n<p>**信任度判断：** TEMPO 超过预报周期一半时间→实际可能是主导天气；相邻机场 TAF 不一致→至少一个不准。</p>\n<p>**放行策略：** 看最新 TAF + 上一份 TAF（6小时前），对比变化趋势。</p>\n<hr>"}, {"id": "k-三-航空气象-3-5-sigmet-与航路气象风险", "label": "3.5 SIGMET 与航路气象风险", "html": "<p>**SIGMET 覆盖：** 雷暴（TS）、严重颠簸（SEV TURB）、严重积冰（SEV ICE）、火山灰云。</p>\n<p>**AIRMET 覆盖：** 中低强度天气（低空/通航）。</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>颠簸等级</th><th>座舱感知</th></tr>\n<tr><td>轻度（LGT）</td><td>杯水面波动</td></tr>\n<tr><td>中度（MOD）</td><td>杯水溅出，行走困难</td></tr>\n<tr><td>严重（SEV）</td><td>人员被甩向安全带</td></tr>\n<tr><td>极度（EXT）</td><td>结构受力，短暂失控</td></tr>\n</table></div>\n<p>**结冰条件：** 温度-露点≤3°C 且飞机将进入云层 = 结冰风险高。</p>\n<hr>"}, {"id": "k-三-航空气象-3-6-雷暴绕飞", "label": "3.6 雷暴绕飞", "html": "<p>**雷达限制：** 气象雷达探测降水粒子回波，看不到 CAT、无冰晶云、远距离上冲气流有限。</p>\n<p>**绕飞策略：**</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>策略</th><th>风险</th></tr>\n<tr><td>上风方向绕飞</td><td>更少颠簸，燃油消耗多</td></tr>\n<tr><td>下风方向绕飞</td><td>遇到更强烈颠簸</td></tr>\n<tr><td>两雷暴间穿过</td><td>间隔≥40nm 为安全</td></tr>\n<tr><td>从顶部飞越</td><td>需飞机升限允许</td></tr>\n<tr><td>等待过境</td><td>时间成本</td></tr>\n</table></div>\n<p>**核心规则：** 红色回波区域绕飞至少 20nm。</p>\n<hr>"}, {"id": "k-三-航空气象-3-7-起降阶段气象决策清单", "label": "3.7 起降阶段气象决策清单", "html": "<p>进近简令中逐项确认：当前 METAR → 前一份对比 → 目的地 TAF → 备降场 TAF → ATIS → 前机 PIREP。</p>\n<p>**刹车效应：** GOOD / GOOD-MEDIUM / MEDIUM / MEDIUM-POOR / POOR。多机组报告 POOR 时使用 MAX 刹车或选择更长跑道。</p>\n<hr>"}]}, {"id": "k-四-空中交通管制", "label": "四、空中交通管制", "subs": [{"id": "k-四-空中交通管制-4-1-read-back-复诵-与-hear-back-监听确认", "label": "4.1 READ BACK（复诵）与 HEAR BACK（监听确认）", "html": "<h4>4.1.1 定义</h4>\n<p>**READ BACK（复诵）**：飞行员收到管制指令后，逐字重复指令要素的过程。本质是一个认知校验——用发声输出验证输入信息的正确性。</p>\n<p>**HEAR BACK（监听确认）**：管制员收到复诵后核实其正确性的责任。复诵有误时必须纠正（\"Negative, I say again...\"）。</p>\n<h4>4.1.2 必须复诵的指令类型</h4>\n<li>跑道相关指令（进入、穿越、等待、起飞、着陆）</li>\n<li>高度、航向、速度指令</li>\n<li>应答机编码</li>\n<li>QNH / QFE</li>\n<li>频率更换</li>\n<p>\"Roger\" 或 \"Wilco\" 对此类指令无效。</p>\n<h4>4.1.3 抄收与复诵对比</h4>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>维度</th><th>抄收</th><th>复诵</th></tr>\n<tr><td>回答用语</td><td>Roger / Wilco</td><td>逐字重复指令要素</td></tr>\n<tr><td>解决的问题</td><td>\"我听到了吗\"</td><td>\"我听对了吗\"</td></tr>\n<tr><td>是否包含参数</td><td>否</td><td>必须包含所有数字</td></tr>\n<tr><td>适用场景</td><td>非关键信息</td><td>上述五类关键指令</td></tr>\n</table></div>\n<h4>4.1.4 READ BACK 常见陷阱</h4>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>陷阱</th><th>表现</th><th>后果</th></tr>\n<tr><td>Roger 替代复诵</td><td>用 Roger 回应关键指令</td><td>管制员无法确认参数正确性</td></tr>\n<tr><td>部分复诵</td><td>漏掉某个要素</td><td>参数偏差影响安全</td></tr>\n<tr><td>期望偏误</td><td>自动\"补全\"听到内容</td><td>复诵与指令不一致</td></tr>\n</table></div>"}, {"id": "k-四-空中交通管制-4-2-cns-atm-架构", "label": "4.2 CNS/ATM 架构", "html": "<p>CNS/ATM（通信 Communication、导航 Navigation、监视 Surveillance / 空中交通管理 Air Traffic Management）是现代空域管理的技术基础。</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>支柱</th><th>技术</th><th>解决的问题</th></tr>\n<tr><td>通信（C）</td><td>CPDLC</td><td>文本化管制指令，消除语音歧义</td></tr>\n<tr><td>导航（N）</td><td>PBN（RNAV/RNP）</td><td>高精度航路保持</td></tr>\n<tr><td>监视（S）</td><td>ADS-B / SSR</td><td>高精度高更新率位置监视</td></tr>\n<tr><td>ATM</td><td>RVSM + 间隔标准</td><td>在保证安全前提下提高空域容量</td></tr>\n</table></div>"}, {"id": "k-四-空中交通管制-4-3-洋区运行-cpdlc-ads-c-工作流", "label": "4.3 洋区运行（CPDLC + ADS-C 工作流）", "html": "<p>进入洋区前：CPDLC LOG ON → ADS-C 合同激活</p>\n<p>巡航中：CPDLC 处理高度变更/通信，ADS-C 自动位置报告</p>\n<p>退出洋区：CPDLC LOG OFF，转回 VHF 通信</p>\n<hr>"}]}, {"id": "k-五-航空法规与标准", "label": "五、航空法规与标准", "subs": [{"id": "k-五-航空法规与标准-5-1-icao-标准用语规范", "label": "5.1 ICAO 标准用语规范", "html": "<h4>5.1.1 \"cleared for takeoff\" 的固定搭配</h4>\n<p>takeoff 只与 cleared 搭配使用，避免与 line up 混淆（ICAO Doc 9432）。</p>\n<h4>5.1.2 频率读法规则</h4>\n<p>整数部分可分段读（118→\"one one eight\"或\"one eighteen\"）；小数部分用 decimal 逐位读（118.35→\"decimal three five\"）。</p>\n<h4>5.1.3 \"after departure\" 的标准术语</h4>\n<p>离地后/离场后的管制术语用 after departure，非 after takeoff，非 after airborne。</p>"}, {"id": "k-五-航空法规与标准-5-2-etops-edto-认证体系", "label": "5.2 ETOPS / EDTO 认证体系", "html": "<p>EDTO（Extended Diversion Time Operations）的核心：确保飞机在航路上任意一点，单发失效后能在规定时间内飞到合适的备降场。</p>\n<p>**三要素认证：**</p>\n<li>**飞机**：关键系统冗余设计，ETOPS Significant System 清单</li>\n<li>**发动机**：IFSD 率低于 0.02/1000 小时（ETOPS-180 标准）</li>\n<li>**航空公司**：维修方案、签派能力、机组训练、MEL 管控</li>\n<p>**备降场要求：** 合适的备降场（跑道长度/道面/导航设施）+ 可用的备降场（天气满足最低标准+进近程序+应急服务）。</p>\n<hr>"}]}, {"id": "k-六-飞行程序与操作", "label": "六、飞行程序与操作", "subs": [{"id": "k-六-飞行程序与操作-6-1-全飞行阶段系统概览", "label": "6.1 全飞行阶段系统概览", "html": "<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>飞行阶段</th><th>涉及系统</th></tr>\n<tr><td>推出/启动</td><td>CPDLC（DCL数字放行）</td></tr>\n<tr><td>滑行</td><td>GNSS 可靠性、低能见度运行</td></tr>\n<tr><td>起飞</td><td>PBN（RNP AR）、风切变、EGPWS Mode 3</td></tr>\n<tr><td>离场爬升</td><td>PBN（SID）、TCAS（TA/RA 高发期）</td></tr>\n<tr><td>航路巡航</td><td>RVSM、ADS-B、CPDLC、ETOPS、TCAS、气象</td></tr>\n<tr><td>下降/进近</td><td>PBN（STAR）、EGPWS（全模式）、TCAS、气象</td></tr>\n<tr><td>最后进近</td><td>PBN（RNP APCH/AR）、EGPWS（Mode 5/6/7）</td></tr>\n<tr><td>着陆滑入</td><td>EGPWS（SmartRunway/SmartLanding）</td></tr>\n</table></div>"}, {"id": "k-六-飞行程序与操作-6-2-etops-延程运行", "label": "6.2 ETOPS 延程运行", "html": "<p>**ETOPS 等级以单发失效后飞至最近备降场的分钟数表示：**</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>等级</th><th>典型应用</th></tr>\n<tr><td>ETOPS-120</td><td>A320/737 跨水</td></tr>\n<tr><td>ETOPS-180</td><td>跨太平洋标准</td></tr>\n<tr><td>ETOPS-240/330</td><td>A330/B777/B787</td></tr>\n</table></div>\n<p>**四层防护体系：**</p>\n<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>层级</th><th>系统</th><th>预警量级</th></tr>\n<tr><td>第一层</td><td>管制程序+CPDLC</td><td>数分钟</td></tr>\n<tr><td>第二层</td><td>RVSM+ADS-B</td><td>分钟级</td></tr>\n<tr><td>第三层</td><td>TCAS RA</td><td>15-35 秒</td></tr>\n<tr><td>第四层</td><td>EGPWS PULL UP</td><td>10-60 秒</td></tr>\n</table></div>"}, {"id": "k-六-飞行程序与操作-6-3-关键系统交互场景", "label": "6.3 关键系统交互场景", "html": "<p>**场景：TCAS RA + GPWS PULL UP 同时触发**</p>\n<li>方向一致 → 按指令执行</li>\n<li>RA\"DESCEND\" + PULL UP → 以 PULL UP 为准（爬升），地形冲突近在咫尺</li>\n<hr>"}]}, {"id": "k-七-应急程序", "label": "七、应急程序", "subs": []}, {"id": "k-八-航空医疗", "label": "八、航空医疗", "subs": []}, {"id": "k-九-人与绩效-human-factors", "label": "九、人与绩效（Human Factors）", "subs": []}]}, "guide": {"title": "指南书", "sections": [{"id": "g-一-icao-标准陆空通话指南", "label": "一、ICAO 标准陆空通话指南", "subs": [{"id": "g-一-icao-标准陆空通话指南-基本原则", "label": "基本原则", "html": "<li>**简洁性**：用最少的话传递完整准确的信息</li>\n<li>**无歧义**：避免可能产生混淆的表达</li>\n<li>**标准化**：使用 ICAO 规定的短语和格式</li>"}, {"id": "g-一-icao-标准陆空通话指南-关键规则", "label": "关键规则", "html": "<p>**许可的语序：** ICAO标准格式——要素先出，许可在后。如 \"CSN3101, runway 01L, cleared for takeoff\"，而非 \"cleared for takeoff, runway 01L\"。</p>\n<p>**READ BACK 必须包含的要素：**</p>\n<li>指令类型（line up, take off, descend, turn left 等）</li>\n<li>所有数字参数（跑道号、高度、航向、速度、频率、应答机编码、气压值）</li>\n<li>单位/限制条件（\"and wait\", \"not above\" 等）</li>\n<li>本机呼号（开头或末尾）</li>\n<p>**不需要复诵的内容：** 前瞻性信息（\"expect...\"）、通波信息（ATIS）、气象信息（除非被要求）。</p>\n<p>**频率读法：** 整数可分段读（118→\"one one eight\"或\"one eighteen\"）；小数用 decimal 逐位读（118.35→\"decimal three five\"），禁止说 \"thirty five\"。</p>\n<p>**高度读法：** 逐位读（FL120→\"flight level one two zero\"），非\"one hundred twenty\"。</p>\n<p>**跑道号读法：** 逐位读（01L→\"runway zero one left\"）。</p>"}, {"id": "g-一-icao-标准陆空通话指南-紧急通话格式", "label": "紧急通话格式", "html": "<li>**MAYDAY ×3**：遇险呼叫，格式：`MAYDAY MAYDAY MAYDAY, [呼号], [位置], [情况], [意图]`</li>\n<li>**PAN-PAN ×3**：紧急呼叫</li>\n<hr>"}]}, {"id": "g-二-民航翻译原则与方法", "label": "二、民航翻译原则与方法", "subs": [{"id": "g-二-民航翻译原则与方法-核心原则", "label": "核心原则", "html": "<li>术语优先使用 CAAC 和 ICAO 官方译法</li>\n<li>缩写第一次出现时附全称（如 VOR（VHF全向信标台））</li>\n<li>保持原文技术精度，不省略\"可能\"\"在xxx条件下\"等限定词</li>\n<li>陆空通话翻译保留标准句式</li>"}, {"id": "g-二-民航翻译原则与方法-常见对应表", "label": "常见对应表", "html": "<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>中文</th><th>英文</th><th>说明</th></tr>\n<tr><td>可以起飞</td><td>cleared for takeoff</td><td>固定搭配，不可替换</td></tr>\n<tr><td>可以落地</td><td>cleared to land</td><td>固定搭配</td></tr>\n<tr><td>可以进入等待</td><td>hold</td><td>不译作 enter holding pattern</td></tr>\n<tr><td>联系</td><td>contact</td><td>不译作 call</td></tr>\n<tr><td>再见</td><td>good day / good night</td><td>不译作 bye</td></tr>\n<tr><td>抄收</td><td>Roger</td><td>仅表示收到</td></tr>\n<tr><td>照办</td><td>Wilco</td><td>收到并执行</td></tr>\n<tr><td>离地后</td><td>after departure</td><td>管制术语，非 after takeoff/airborne</td></tr>\n</table></div>\n<hr>"}]}, {"id": "g-三-metar-taf-解码指南", "label": "三、METAR / TAF 解码指南", "subs": [{"id": "g-三-metar-taf-解码指南-metar-读取顺序-按决策优先级", "label": "METAR 读取顺序（按决策优先级）", "html": "<li>风、能见度/RVR、天气现象 → 能否起降</li>\n<li>云（云底高、云量）→ 进近方式</li>\n<li>温度/露点、QNH → 结冰条件、高度表</li>\n<li>最近一小时变化 → 趋势判断</li>"}, {"id": "g-三-metar-taf-解码指南-rvr-与能见度对照", "label": "RVR 与能见度对照", "html": "<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>进近类型</th><th>RVR 最低标准</th></tr>\n<tr><td>CAT I</td><td>550m</td></tr>\n<tr><td>CAT II</td><td>300-350m</td></tr>\n<tr><td>CAT IIIA</td><td>200m</td></tr>\n<tr><td>CAT IIIB</td><td>50-200m</td></tr>\n<tr><td>非精密/类精密</td><td>800-1200m</td></tr>\n</table></div>\n<p>着陆以跑道入口点和中间点 RVR 中较低值为准。</p>"}, {"id": "g-三-metar-taf-解码指南-taf-关键限定词", "label": "TAF 关键限定词", "html": "<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>词</th><th>含义</th></tr>\n<tr><td>FM</td><td>确定性转变</td></tr>\n<tr><td>TEMPO</td><td>短暂出现（每次<1小时）</td></tr>\n<tr><td>BECMG</td><td>逐步渐变</td></tr>\n<tr><td>PROB30/PROB40</td><td>概率性</td></tr>\n</table></div>"}, {"id": "g-三-metar-taf-解码指南-sigmet-颠簸等级", "label": "SIGMET 颠簸等级", "html": "<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>等级</th><th>座舱感知</th></tr>\n<tr><td>轻度 LGT</td><td>杯水面波动</td></tr>\n<tr><td>中度 MOD</td><td>杯水溅出，行走困难</td></tr>\n<tr><td>严重 SEV</td><td>人员被甩向安全带</td></tr>\n<tr><td>极度 EXT</td><td>结构受力，飞机短暂失控</td></tr>\n</table></div>"}, {"id": "g-三-metar-taf-解码指南-结冰条件速判", "label": "结冰条件速判", "html": "<p>温度 - 露点 ≤ 3°C 且飞机将进入云层 = 结冰风险高。</p>"}, {"id": "g-三-metar-taf-解码指南-雷暴绕飞", "label": "雷暴绕飞", "html": "<li>红色回波：绕飞至少 20nm</li>\n<li>两雷暴间安全间隔：≥ 40nm</li>\n<li>上风方向绕飞比下风方向颠簸轻</li>\n<li>气象雷达看不到 CAT 和冰晶云</li>\n<hr>"}]}, {"id": "g-四-notam-解码指南", "label": "四、NOTAM 解码指南", "subs": [], "content": "<p>*（待完善）*</p>\n<hr>"}, {"id": "g-五-紧急代码与程序速查", "label": "五、紧急代码与程序速查", "subs": [], "content": "<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>代码</th><th>含义</th><th>场景</th></tr>\n<tr><td>7700</td><td>一般紧急情况</td><td>发动机失效、火警、结构损坏</td></tr>\n<tr><td>7600</td><td>无线电失效</td><td>双向通信中断</td></tr>\n<tr><td>7500</td><td>非法干扰/劫机</td><td>保持常规飞行（如安全允许）</td></tr>\n</table></div>\n<hr>"}, {"id": "g-六-icao-字母拼读法", "label": "六、ICAO 字母拼读法", "subs": [], "content": "<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>字母</th><th>代码</th><th>字母</th><th>代码</th></tr>\n<tr><td>A</td><td>Alfa</td><td>N</td><td>November</td></tr>\n<tr><td>B</td><td>Bravo</td><td>O</td><td>Oscar</td></tr>\n<tr><td>C</td><td>Charlie</td><td>P</td><td>Papa</td></tr>\n<tr><td>D</td><td>Delta</td><td>Q</td><td>Quebec</td></tr>\n<tr><td>E</td><td>Echo</td><td>R</td><td>Romeo</td></tr>\n<tr><td>F</td><td>Foxtrot</td><td>S</td><td>Sierra</td></tr>\n<tr><td>G</td><td>Golf</td><td>T</td><td>Tango</td></tr>\n<tr><td>H</td><td>Hotel</td><td>U</td><td>Uniform</td></tr>\n<tr><td>I</td><td>India</td><td>V</td><td>Victor</td></tr>\n<tr><td>J</td><td>Juliett</td><td>W</td><td>Whiskey</td></tr>\n<tr><td>K</td><td>Kilo</td><td>X</td><td>X-ray</td></tr>\n<tr><td>L</td><td>Lima</td><td>Y</td><td>Yankee</td></tr>\n<tr><td>M</td><td>Mike</td><td>Z</td><td>Zulu</td></tr>\n</table></div>\n<p>**数字读法：** 0→Zero, 1→One, 2→Two, 3→Three, 4→Four, 5→Five, 6→Six, 7→Seven, 8→Eight, 9→Nine。注意 9 读作 NINER 避免与 Five 混淆。</p>\n<hr>"}, {"id": "g-七-关键系统操作速查", "label": "七、关键系统操作速查", "subs": [{"id": "g-七-关键系统操作速查-tcas-ra-处置", "label": "TCAS RA 处置", "html": "<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>步骤</th><th>动作</th></tr>\n<tr><td>1</td><td>立即响应，不分析不犹豫</td></tr>\n<tr><td>2</td><td>柔和但果断操纵，约 0.25G，1500-2000 ft/min</td></tr>\n<tr><td>3</td><td>不使用航向改变回避</td></tr>\n<tr><td>4</td><td>机动后报告管制员 \"TCAS RA\"</td></tr>\n<tr><td>5</td><td>语音 \"CLEAR OF CONFLICT\" 后返回原高度</td></tr>\n</table></div>\n<p>RA 优先级高于管制指令。低高度（<1100ft RA）自动抑制为 TA only。</p>"}, {"id": "g-七-关键系统操作速查-gpws-pull-up-记忆项目", "label": "GPWS PULL UP 记忆项目", "html": "<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>顺序</th><th>动作</th></tr>\n<tr><td>1</td><td>断开自动驾驶和自动油门</td></tr>\n<tr><td>2</td><td>最大推力（TOGA）</td></tr>\n<tr><td>3</td><td>抬头至 15-20°（不超过抖杆/失速保护）</td></tr>\n<tr><td>4</td><td>确认正上升率</td></tr>\n<tr><td>5</td><td>按 FCOM 收襟翼</td></tr>\n<tr><td>6</td><td>结合地形显示避让</td></tr>\n</table></div>\n<p>PULL UP 与 TCAS RA 冲突时，PULL UP 优先。</p>"}, {"id": "g-七-关键系统操作速查-cpdlc-常用回应", "label": "CPDLC 常用回应", "html": "<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>回应</th><th>含义</th></tr>\n<tr><td>WILCO</td><td>收到并承诺执行</td></tr>\n<tr><td>ROGER</td><td>收到（不承诺执行）</td></tr>\n<tr><td>STANDBY</td><td>待处理</td></tr>\n<tr><td>UNABLE</td><td>无法执行</td></tr>\n</table></div>"}, {"id": "g-七-关键系统操作速查-侧风心算", "label": "侧风心算", "html": "<div class=\"tbl-wrap\"><table class=\"info-tbl\"><tr><th>风向夹角</th><th>侧风 = 风速 ×</th></tr>\n<tr><td>30°</td><td>50%</td></tr>\n<tr><td>45°</td><td>70%</td></tr>\n<tr><td>60°</td><td>90%</td></tr>\n</table></div>\n<hr>"}]}]}, "abbreviations": {"title": "缩略词", "sections": [{"id": "a-一-机构与组织", "label": "一、机构与组织", "empty": false, "subs": [{"id": "a-一-机构与组织-1-1-国际组织", "label": "1.1 国际组织", "items": [["ICAO", "International Civil Aviation Organization", "国际民用航空组织"], ["IATA", "International Air Transport Association", "国际航空运输协会"], ["IFALPA", "International Federation of Air Line Pilots' Associations", "国际航线飞行员联合会"], ["ACI", "Airports Council International", "国际机场协会"], ["CANSO", "Civil Air Navigation Services Organisation", "民用空中导航服务组织"]]}, {"id": "a-一-机构与组织-1-2-各国管理局", "label": "1.2 各国管理局", "items": [["CAAC", "Civil Aviation Administration of China", "中国民用航空局"], ["FAA", "Federal Aviation Administration", "美国联邦航空管理局"], ["EASA", "European Union Aviation Safety Agency", "欧洲航空安全局"], ["CASA", "Civil Aviation Safety Authority", "澳大利亚民航安全局"], ["JCAB", "Japan Civil Aviation Bureau", "日本国土交通省航空局"]]}, {"id": "a-一-机构与组织-1-3-制造商", "label": "1.3 制造商", "items": [["Boeing", "", "波音公司"], ["Airbus", "", "空中客车公司"], ["EMB/E", "Embraer", "巴西航空工业公司"], ["ATR", "Avions de Transport Régional", "法意区域运输机公司"], ["BBD", "Bombardier", "庞巴迪公司"]]}]}, {"id": "a-二-空中交通管制", "label": "二、空中交通管制", "empty": false, "subs": [{"id": "a-二-空中交通管制-2-1-管制单位", "label": "2.1 管制单位", "items": [["ATC", "Air Traffic Control", "空中交通管制"], ["ACC", "Area Control Center", "区域管制中心"], ["APP", "Approach Control", "进近管制"], ["TWR", "Tower/Aerodrome Control", "塔台/机场管制"], ["GND", "Ground Control", "地面管制"], ["D-ATIS", "Data-link Automatic Terminal Information Service", "数据链通波"]]}, {"id": "a-二-空中交通管制-2-2-空域与航行", "label": "2.2 空域与航行", "items": [["ATIS", "Automatic Terminal Information Service", "自动终端情报服务 / 通波"], ["CTA", "Control Area", "管制空域"], ["CTR", "Control Zone", "管制地带"], ["TMA", "Terminal Control Area", "终端管制区"], ["AWY", "Airway", "航路"], ["SID", "Standard Instrument Departure", "标准仪表离场"], ["STAR", "Standard Terminal Arrival Route", "标准仪表进场"], ["RVSM", "Reduced Vertical Separation Minima", "缩小垂直间隔"], ["NOTAM", "Notice to Air Missions", "航行通告"]]}]}, {"id": "a-三-飞行与导航参数", "label": "三、飞行与导航参数", "empty": false, "subs": [{"id": "a-三-飞行与导航参数-3-1-高度与气压", "label": "3.1 高度与 var currentNb='words';
var currentPageId=null;

function switchNotebook(nbKey){
  currentNb=nbKey;
  document.querySelectorAll('.tab-btn').forEach(function(e){e.classList.toggle('active',e.dataset.nb===nbKey)});
  renderSidebar();
  // 默认选择第一个页面
  var nb=DATA[currentNb];
  if(nb && nb.sections.length>0){
    var firstSec=nb.sections[0];
    if(firstSec.subs && firstSec.subs.length>0){
      goToPage(firstSec.subs[0].id);
    }else{
      goToPage(firstSec.id);
    }
  }
}
function removeEmoji(str){
  return str.replace(/[\u{1F000}-\u{1F9FF}]/gu, '').trim();
}
function renderSidebar(){
  var sb=document.getElementById('sidebar'),nb=DATA[currentNb];
  if(!nb)return;
  var html='<div class="sec-title">'+nb.title+' 目录</div>';
  nb.sections.forEach(function(sec){
    if(sec.subs && sec.subs.length>0){
      html+='<a href="javascript:void(0)" data-id="'+sec.id+'">'+removeEmoji(sec.label)+'</a>';
      sec.subs.forEach(function(sub){html+='<a class="sub" href="javascript:void(0)" data-id="'+sub.id+'">'+removeEmoji(sub.label)+'</a>'});
    } else {
      html+='<a href="javascript:void(0)" data-id="'+sec.id+'">'+removeEmoji(sec.label)+(sec.empty?' <span style="color:var(--text-muted);font-size:.75rem;">（空）</span>':'')+'</a>';
    }
  });
  sb.innerHTML=html;
  sb.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click',function(){
      goToPage(this.getAttribute('data-id'));
    });
  });
  updateSidebarActive();
}
function goToPage(id){
  currentPageId=id;
  renderContent();
  updateSidebarActive();
  window.scrollTo(0,0);
  history.pushState(null, '', '#'+id);
}
function updateSidebarActive(){
  document.querySelectorAll('.sidebar a').forEach(function(a){a.classList.remove('active')});
  if(currentPageId){
    var t=document.querySelector('.sidebar a[data-id="'+currentPageId+'"]');
    if(t)t.classList.add('active');
  }
}
function getAllPageIds(){
  var ids=[];
  var nb=DATA[currentNb];
  if(!nb)return ids;
  nb.sections.forEach(function(sec){
    if(sec.subs && sec.subs.length>0){
      sec.subs.forEach(function(sub){ids.push(sub.id)});
    }else{
      ids.push(sec.id);
    }
  });
  return ids;
}
function renderContent(){
  var main=document.getElementById('mainContent'),nb=DATA[currentNb];
  if(!nb)return;
  
  // 找到当前页面数据
  var page=null;
  var isSubPage=false;
  var parentSection=null;
  nb.sections.forEach(function(sec){
    if(sec.id===currentPageId){
      page=sec;
    }else if(sec.subs){
      sec.subs.forEach(function(sub){
        if(sub.id===currentPageId){
          page=sub;
          isSubPage=true;
          parentSection=sec;
        }
      });
    }
  });
  
  if(!page && nb.sections.length>0){
    var firstSec=nb.sections[0];
    if(firstSec.subs && firstSec.subs.length>0){
      page=firstSec.subs[0];
      isSubPage=true;
      parentSection=firstSec;
    }else{
      page=firstSec;
    }
    currentPageId=page.id;
  }
  
  var html='';
  
  // 渲染单个页面
  if(page){
    if(page.empty){
      html+='<div class="content-card" id="'+page.id+'"><h2>'+page.label+'</h2><div class="empty-state">\u6682\u65e0\u6761\u76ee</div></div>';
    } else if(page.items){
      var r='';
      page.items.forEach(function(it){r+='<tr><td>'+it[0]+'</td><td>'+it[1]+'</td><td>'+it[2]+'</td></tr>'});
      var heads = currentNb === 'abbreviations' ? '<th>\u7f29\u5199</th><th>\u5168\u79f0</th><th>\u7ffb\u8bd1</th>' : '<th>\u672f\u8bed</th><th>\u7ffb\u8bd1</th><th>\u8bf4\u660e</th>';
      html+='<div class="content-card" id="'+page.id+'"><h2>'+page.label+'</h2><div class="tbl-wrap"><table class="words-tbl"><tr>'+heads+'</tr>'+r+'</table></div></div>';
    } else if(page.subs && !isSubPage){
      // 这是一个父章节，且当前选中的是父章节，显示提示
      html+='<div class="content-card" id="'+page.id+'"><h2>'+page.label+'</h2>';
      html+='<div style="margin-top:12px;"><p style="color:var(--text-muted);">请从左侧目录选择一个小节开始阅读。</p></div>';
      html+='</div>';
    } else if(page.content){
      html+='<div class="content-card" id="'+page.id+'"><h2>'+page.label+'</h2>'+page.content+'</div>';
    } else if(page.html){
      // 子页面有 html 属性
      html+='<div class="content-card" id="'+page.id+'"><h2>'+parentSection.label+'</h2><div style="margin-top:12px;"><h3>'+page.label+'</h3>'+page.html+'</div></div>';
    }
    
    // 添加上一页/下一页导航
    var allIds=getAllPageIds();
    var currentIndex=allIds.indexOf(currentPageId);
    var prevId=currentIndex>0?allIds[currentIndex-1]:null;
    var nextId=currentIndex<allIds.length-1?allIds[currentIndex+1]:null;
    
    html+='<div class="nav-buttons">';
    if(prevId){
      html+='<a href="javascript:void(0)" class="nav-btn" data-id="'+prevId+'">← 上一页</a>';
    } else {
      html+='<span class="nav-btn disabled">← 上一页</span>';
    }
    if(nextId){
      html+='<a href="javascript:void(0)" class="nav-btn" data-id="'+nextId+'">下一页 →</a>';
    } else {
      html+='<span class="nav-btn disabled">下一页 →</span>';
    }
    html+='</div>';
  }
  
  main.innerHTML=html;
  
  // 为导航按钮添加事件监听
  main.querySelectorAll('.nav-buttons a').forEach(function(a){
    a.addEventListener('click',function(){
      goToPage(this.getAttribute('data-id'));
    });
  });
}
function handleHashChange(){
  var hash=window.location.hash.slice(1);
  if(hash){
    currentPageId=hash;
    renderContent();
    updateSidebarActive();
  }
}
window.addEventListener('hashchange',handleHashChange);

// 移动端菜单开关
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

function toggleMenu() {
  menuBtn.classList.toggle('active');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('active');
}

function closeMenu() {
  menuBtn.classList.remove('active');
  sidebar.classList.remove('open');
  overlay.classList.remove('active');
}

menuBtn.addEventListener('click', toggleMenu);
overlay.addEventListener('click', closeMenu);

// 点击侧边栏链接时关闭菜单
sidebar.addEventListener('click', function(e) {
  if (e.target.tagName === 'A') {
    closeMenu();
  }
});

switchNotebook('words');
</script>
